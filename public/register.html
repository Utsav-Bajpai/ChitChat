<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChitChat — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <div class="auth-bg">
    <div class="auth-blob blob1"></div>
    <div class="auth-blob blob2"></div>
    <div class="auth-blob blob3"></div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="logo-icon">✦</div>
        <span class="logo-text">ChitChat</span>
      </div>

      <h1 class="auth-title">Create account</h1>
      <p class="auth-sub">Join ChitChat and start messaging</p>

      <div class="error-banner"   id="errorBanner"   style="display:none"></div>
      <div class="success-banner" id="successBanner" style="display:none"></div>

      <div class="auth-form">

        <div class="field-group">
          <label class="field-label">Username <span class="required">*</span></label>
          <input type="text" id="username" class="field-input" placeholder="How should people call you?" autocomplete="off"/>
        </div>

        <div class="field-group">
          <label class="field-label">Email <span class="required">*</span></label>
          <input type="email" id="email" class="field-input" placeholder="you@example.com"/>
        </div>

        <div class="field-group">
          <label class="field-label">Password <span class="required">*</span></label>
          <div class="input-with-toggle">
            <input type="password" id="password" class="field-input" placeholder="Min 6 characters" autocomplete="new-password"/>
            <button class="toggle-pw" id="togglePw" type="button">👁</button>
          </div>
          <div class="password-strength" id="pwStrength"></div>
        </div>

        <button class="auth-btn" id="registerBtn">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader" style="display:none">●●●</span>
        </button>
      </div>

      <p class="auth-switch">Already have an account? <a href="login.html">Sign in →</a></p>

    </div>
  </div>

  <!--
    ════════════════════════════════════════════
    STEP 1: Paste your Firebase config below.
    Get it from: Firebase Console → Project Settings → Your apps → SDK setup
    ════════════════════════════════════════════
  -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // ▼▼▼ PASTE YOUR CONFIG HERE ▼▼▼
    const firebaseConfig = {
        apiKey: "AIzaSyC59UtIeur89yITq_rwRnpzDsc8zGxbwfk",
        authDomain: "chitchat-c69dc.firebaseapp.com",
        projectId: "chitchat-c69dc",
        storageBucket: "chitchat-c69dc.firebasestorage.app",
        messagingSenderId: "52214505917",
        appId: "1:52214505917:web:cce594b8d96209abb332d4"
      
    };
    // ▲▲▲ PASTE YOUR CONFIG HERE ▲▲▲

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);

    // Expose to the non-module script below
    window.__auth = auth;
    window.__createUser = createUserWithEmailAndPassword;
    window.__firebaseReady = true;
  </script>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem("chitchat_session")) {
      window.location.href = "index.html";
    }

    const registerBtn   = document.getElementById("registerBtn");
    const errorBanner   = document.getElementById("errorBanner");
    const successBanner = document.getElementById("successBanner");
    const togglePw      = document.getElementById("togglePw");
    const pwInput       = document.getElementById("password");
    const pwStrength    = document.getElementById("pwStrength");

    // Toggle password visibility
    togglePw.addEventListener("click", () => {
      pwInput.type = pwInput.type === "password" ? "text" : "password";
      togglePw.textContent = pwInput.type === "password" ? "👁" : "🙈";
    });

    // Password strength meter
    pwInput.addEventListener("input", () => {
      const val = pwInput.value;
      let strength = 0;
      if (val.length >= 6)           strength++;
      if (/[A-Z]/.test(val))         strength++;
      if (/[0-9]/.test(val))         strength++;
      if (/[^A-Za-z0-9]/.test(val))  strength++;

      const labels = ["", "Weak", "Fair", "Good", "Strong"];
      const colors = ["", "#e74c3c", "#f39c12", "#3498db", "#2ecc71"];
      pwStrength.textContent = val ? `Strength: ${labels[strength]}` : "";
      pwStrength.style.color = colors[strength];
    });

    function showError(msg) {
      successBanner.style.display = "none";
      errorBanner.textContent = msg;
      errorBanner.style.display = "block";
      errorBanner.classList.remove("shake");
      void errorBanner.offsetWidth;
      errorBanner.classList.add("shake");
    }

    function showSuccess(msg) {
      errorBanner.style.display = "none";
      successBanner.textContent = msg;
      successBanner.style.display = "block";
    }

    function setLoading(loading) {
      registerBtn.querySelector(".btn-text").style.display = loading ? "none" : "inline";
      registerBtn.querySelector(".btn-loader").style.display = loading ? "inline" : "none";
      registerBtn.disabled = loading;
    }

    async function handleRegister() {
      const username = document.getElementById("username").value.trim();
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      errorBanner.style.display = "none";

      // Client-side validation
      if (!username)          return showError("Username is required.");
      if (!email)             return showError("Email is required.");
      if (password.length < 6) return showError("Password must be at least 6 characters.");
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showError("Invalid email format.");

      if (!window.__firebaseReady) {
        return showError("Still loading, please try again in a moment.");
      }

      setLoading(true);
      try {
        // 1. Create user in Firebase Auth
        const { user } = await window.__createUser(window.__auth, email, password);

        // 2. Get ID token
        const token = await user.getIdToken();

        // 3. Save username + avatar to Firestore via your server
        const saveRes = await fetch("/api/user/save", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({ username })
        });

        if (!saveRes.ok) {
          const data = await saveRes.json();
          throw new Error(data.error || "Could not save profile.");
        }

        showSuccess("Account created! Redirecting to login...");
        setTimeout(() => window.location.href = "login.html", 1500);

      } catch (err) {
        const msg = {
          "auth/email-already-in-use": "An account with this email already exists.",
          "auth/invalid-email":        "Please enter a valid email address.",
          "auth/weak-password":        "Password must be at least 6 characters."
        }[err.code] || err.message || "Registration failed.";
        showError(msg);
      } finally {
        setLoading(false);
      }
    }

    registerBtn.addEventListener("click", handleRegister);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleRegister();
    });
  </script>

</body>
</html>
