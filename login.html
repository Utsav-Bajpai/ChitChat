<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChitChat — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <div class="auth-bg">
    <div class="auth-blob blob1"></div>
    <div class="auth-blob blob2"></div>
    <div class="auth-blob blob3"></div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="logo-icon">✦</div>
        <span class="logo-text">ChitChat</span>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to continue your conversations</p>

      <div class="error-banner" id="errorBanner" style="display:none"></div>

      <div class="auth-form">
        <div class="field-group">
          <label class="field-label">Email</label>
          <input
            type="email"
            id="credential"
            class="field-input"
            placeholder="you@example.com"
            autocomplete="username"
          />
        </div>

        <div class="field-group">
          <label class="field-label">Password</label>
          <div class="input-with-toggle">
            <input
              type="password"
              id="password"
              class="field-input"
              placeholder="Enter password"
              autocomplete="current-password"
            />
            <button class="toggle-pw" id="togglePw" type="button" aria-label="Toggle password">👁</button>
          </div>
        </div>

        <button class="auth-btn" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader" style="display:none">●●●</span>
        </button>
      </div>

      <p class="auth-switch">Don't have an account? <a href="register.html">Create one →</a></p>

    </div>
  </div>

  <!--
    ════════════════════════════════════════════
    STEP 1: Paste your Firebase config below.
    Get it from: Firebase Console → Project Settings → Your apps → SDK setup
    ════════════════════════════════════════════
  -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // ▼▼▼ PASTE YOUR CONFIG HERE ▼▼▼
    const firebaseConfig = {
        apiKey: "AIzaSyC59UtIeur89yITq_rwRnpzDsc8zGxbwfk",
        authDomain: "chitchat-c69dc.firebaseapp.com",
        projectId: "chitchat-c69dc",
        storageBucket: "chitchat-c69dc.firebasestorage.app",
        messagingSenderId: "52214505917",
        appId: "1:52214505917:web:cce594b8d96209abb332d4"
      
    };
      // ▲▲▲ PASTE YOUR CONFIG HERE ▲▲▲

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);

    // Expose to the non-module script below
    window.__auth = auth;
    window.__signIn = signInWithEmailAndPassword;
    window.__firebaseReady = true;
  </script>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem("chitchat_session")) {
      window.location.href = "index.html";
    }

    const loginBtn    = document.getElementById("loginBtn");
    const errorBanner = document.getElementById("errorBanner");
    const togglePw    = document.getElementById("togglePw");

    togglePw.addEventListener("click", () => {
      const pw = document.getElementById("password");
      pw.type = pw.type === "password" ? "text" : "password";
      togglePw.textContent = pw.type === "password" ? "👁" : "🙈";
    });

    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.style.display = "block";
      errorBanner.classList.remove("shake");
      void errorBanner.offsetWidth; // reflow to restart animation
      errorBanner.classList.add("shake");
    }

    function setLoading(loading) {
      loginBtn.querySelector(".btn-text").style.display = loading ? "none" : "inline";
      loginBtn.querySelector(".btn-loader").style.display = loading ? "inline" : "none";
      loginBtn.disabled = loading;
    }

    async function handleLogin() {
      const email    = document.getElementById("credential").value.trim();
      const password = document.getElementById("password").value;

      errorBanner.style.display = "none";
      if (!email || !password) return showError("Please fill in all fields.");

      // Wait for Firebase module to initialise
      if (!window.__firebaseReady) {
        return showError("Still loading, please try again in a moment.");
      }

      setLoading(true);
      try {
        // 1. Sign in with Firebase Auth
        const { user } = await window.__signIn(window.__auth, email, password);

        // 2. Get a fresh ID token
        const token = await user.getIdToken();

        // 3. Fetch this user's profile from Firestore (via your server)
        const profileRes = await fetch("/api/users", {
          headers: { Authorization: `Bearer ${token}` }
        });

        if (!profileRes.ok) throw new Error("Could not load profile.");

        // 4. Save session to localStorage
        const avatar = (user.displayName || email).slice(0, 2).toUpperCase();
        localStorage.setItem("chitchat_session", JSON.stringify({
          token,
          user: {
            id: user.uid,
            username: user.displayName || email.split("@")[0],
            avatar
          }
        }));

        window.location.href = "index.html";

      } catch (err) {
        // Map Firebase error codes to friendly messages
        const msg = {
          "auth/user-not-found":   "No account found with this email.",
          "auth/wrong-password":   "Incorrect password.",
          "auth/invalid-email":    "Please enter a valid email address.",
          "auth/too-many-requests":"Too many attempts. Try again later.",
          "auth/invalid-credential": "Invalid email or password."
        }[err.code] || err.message || "Login failed.";
        showError(msg);
      } finally {
        setLoading(false);
      }
    }

    loginBtn.addEventListener("click", handleLogin);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleLogin();
    });
  </script>

</body>
</html>
